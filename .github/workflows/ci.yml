name: CI

# Run on every push and on pull requests targeting main or dev.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  smoke-test:
    name: Smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install light dependencies
        # Only the CLI's own deps -- not the heavy MD backend (torch, fairchem,
        # plumed), which isn't needed to smoke-test the interface.
        run: |
          python -m pip install --upgrade pip
          python -m pip install "typer>=0.12" "questionary>=2.0" "ase>=3.29"

      - name: Syntax-check every Python file
        run: python -m py_compile $(git ls-files '*.py')

      - name: CLI help runs
        run: |
          python -m cli.app --help
          python -m cli.app md run --help
          python -m cli.app sp run --help
          python -m cli.app relax run --help
          python -m cli.app postprocess wrap --help

      - name: Generated scripts are valid Python
        # Assemble each script variant to stdout, write it out, and py_compile it.
        run: |
          printf 'UNITS LENGTH=A TIME=fs ENERGY=eV\nd: DISTANCE ATOMS=1,2\nMETAD ARG=d PACE=500 HEIGHT=0.02 SIGMA=0.2 BIASFACTOR=10 GRID_MIN=0 GRID_MAX=15 GRID_BIN=300 FILE=HILLS\nPRINT ARG=d FILE=COLVAR STRIDE=50\n' > /tmp/plumed.dat
          python -m cli.app md run --job nvt -c model.pt -s in.xyz \
            --cell "20 20 20" --stdout > /tmp/nvt.py
          python -m cli.app md run --job nvt -c model.pt -s in.xyz \
            --cell "20 20 20" --plumed /tmp/plumed.dat --stdout > /tmp/biased.py
          python -m cli.app md run --job nvt --calculator mace --variant mace_mp \
            -c mace.model -s in.xyz --cell "20 20 20" --precision float32 \
            --dispersion True --traj-format xyz --wrap --stdout > /tmp/mace.py
          python -m cli.app md run --job nvt --calculator orb --variant orb_v3_omat \
            -s in.xyz --cell "20 20 20" --stdout > /tmp/orb.py
          python -m cli.app md run --job nvt --calculator orb --variant orb_v3_omol \
            -s mol.xyz --charge 0 --multiplicity 1 --precision float32-high \
            --stdout > /tmp/orbmol.py
          python -m cli.app md run --job nvt --calculator grace \
            --variant GRACE-2L-OMAT-large-ft-E -s in.xyz --cell "20 20 20" \
            --stdout > /tmp/grace.py
          python -m cli.app md run --job nvt --thermostat langevin -c model.pt \
            -s in.xyz --cell "20 20 20" --friction 0.02 --stdout > /tmp/langevin.py
          python -m cli.app md run --job nvt --thermostat csvr -c model.pt \
            -s in.xyz --cell "20 20 20" --taut 80 --stdout > /tmp/csvr.py
          python -m cli.app md run --job nve -c model.pt -s in.xyz \
            --cell "20 20 20" --stdout > /tmp/nve.py
          python -m cli.app md run --job nvt --calculator orca -s mol.xyz \
            --pbc false --charge 0 --multiplicity 1 --nprocs 8 \
            --orcasimpleinput "BP86 def2-SVP" --stdout > /tmp/orca_md.py
          python -m cli.app sp run --calculator orca -s mol.xyz --pbc false \
            --nprocs 16 --orcasimpleinput "B3LYP def2-TZVP D3BJ" \
            --orcablock "%scf maxiter 300 end" --orcablock "%method integrationgrid 3 end" \
            --stdout > /tmp/orca_sp.py
          python -m cli.app sp run --calculator uma -c model.pt -s mol.xyz \
            --pbc false --forces False --stdout > /tmp/uma_sp.py
          python -m cli.app relax run --calculator uma -c model.pt -s mol.xyz \
            --pbc false --optimizer bfgs --fmax 0.05 --stdout > /tmp/relax_uma.py
          python -m cli.app relax run --calculator orca -s mol.xyz --pbc false \
            --optimizer fire --fmax 0.02 --nprocs 8 --stdout > /tmp/relax_orca.py
          python -m cli.app relax run --calculator mace --variant mace_off \
            -c mace.model -s mol.xyz --pbc false --optimizer lbfgs --stdout > /tmp/relax_mace.py
          python -m cli.app sp run --calculator espresso -s NaCl.cif \
            --cell "5.64 5.64 5.64" --command "mpiexec -n 4 pw.x" \
            --pseudo-dir /pseudos --pseudo "Na=na.UPF" --pseudo "Cl=cl.UPF" \
            --ecutwfc 60 --ecutrho 480 --kpts "4 4 4" \
            --input "occupations=smearing" --stdout > /tmp/qe_sp.py
          python -m cli.app relax run --calculator espresso -s Fe.cif \
            --cell "2.87 2.87 2.87" --pseudo "Fe=fe.UPF" --ecutwfc 60 \
            --kpts "2 2 2" --charge 0 --multiplicity 3 --optimizer lbfgs \
            --stdout > /tmp/qe_relax.py
          python -m cli.app md run --job nvt --calculator espresso -s NaCl.cif \
            --cell "5.64 5.64 5.64" --pseudo "Na=na.UPF" --pseudo "Cl=cl.UPF" \
            --ecutwfc 60 -n 50 --stdout > /tmp/qe_md.py
          python -m cli.app postprocess wrap in.traj --stdout > /tmp/wrap.py
          python -m py_compile /tmp/nvt.py /tmp/biased.py /tmp/mace.py /tmp/orb.py \
            /tmp/orbmol.py /tmp/grace.py /tmp/langevin.py /tmp/csvr.py /tmp/nve.py \
            /tmp/orca_md.py /tmp/orca_sp.py /tmp/uma_sp.py /tmp/relax_uma.py \
            /tmp/relax_orca.py /tmp/relax_mace.py /tmp/qe_sp.py /tmp/qe_relax.py \
            /tmp/qe_md.py /tmp/wrap.py
